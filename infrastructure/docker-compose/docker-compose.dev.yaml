version: '3.8'

services:
  # Omit minio and prometheus in dev variant
  minio:
    profiles:
      - donotstart
  prometheus:
    profiles:
      - donotstart

  kafka:
    environment:
      # minimal memory usage
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms256m"

  clickhouse:
    environment:
      # minimal memory configuration
      MAX_SERVER_MEMORY_USAGE: 1073741824

  grafana:
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=dev
