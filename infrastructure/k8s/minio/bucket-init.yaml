apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  namespace: log-platform
  labels:
    app.kubernetes.io/name: minio-init
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: log-platform
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            - |
              mc alias set myminio http://minio:9000 minioadmin minioadmin
              mc mb --ignore-existing myminio/logs-warm
              mc mb --ignore-existing myminio/logs-cold
              mc mb --ignore-existing myminio/logs-archive
              mc ilm add --expire-days 30 myminio/logs-warm
              mc ilm add --expire-days 90 myminio/logs-cold
              mc ilm add --expire-days 365 myminio/logs-archive
