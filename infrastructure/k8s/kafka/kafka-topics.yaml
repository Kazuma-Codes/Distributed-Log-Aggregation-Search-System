apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: logs-application
  namespace: log-platform
  labels:
    strimzi.io/cluster: log-kafka
    app.kubernetes.io/part-of: log-platform
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 604800000
    segment.bytes: 1073741824
---
