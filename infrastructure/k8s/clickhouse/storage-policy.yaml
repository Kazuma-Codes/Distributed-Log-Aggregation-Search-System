apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-storage-policy
  namespace: log-platform
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: log-platform
data:
  storage_policy.xml: |
    <clickhouse>
      <storage_configuration>
        <disks>
          <hot_disk>
            <path>/var/lib/clickhouse/</path>
          </hot_disk>
          <warm_s3>
            <type>s3</type>
            <endpoint>http://minio.log-platform.svc:9000/logs-warm/data/</endpoint>
            <access_key_id>minioadmin</access_key_id>
            <secret_access_key>minioadmin</secret_access_key>
          </warm_s3>
          <cold_s3>
            <type>s3</type>
            <endpoint>http://minio.log-platform.svc:9000/logs-cold/data/</endpoint>
            <access_key_id>minioadmin</access_key_id>
            <secret_access_key>minioadmin</secret_access_key>
          </cold_s3>
        </disks>
        <policies>
          <tiered_storage>
            <volumes>
              <hot>
                <disk>hot_disk</disk>
              </hot>
              <warm>
                <disk>warm_s3</disk>
              </warm>
              <cold>
                <disk>cold_s3</disk>
              </cold>
            </volumes>
            <move_factor>0.2</move_factor>
          </tiered_storage>
        </policies>
      </storage_configuration>
    </clickhouse>
