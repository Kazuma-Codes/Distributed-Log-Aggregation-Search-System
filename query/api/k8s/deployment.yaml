apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-api
  labels:
    app: query-api
    component: query
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query-api
  template:
    metadata:
      labels:
        app: query-api
        component: query
    spec:
      # Spread pods across nodes for high availability.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - query-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: query-api
          image: query-api:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: CLICKHOUSE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: query-api-config
                  key: CLICKHOUSE_ADDR
            - name: CLICKHOUSE_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: query-api-config
                  key: CLICKHOUSE_DATABASE
            - name: CLICKHOUSE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: query-api-secrets
                  key: CLICKHOUSE_USERNAME
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: query-api-secrets
                  key: CLICKHOUSE_PASSWORD
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: query-api-secrets
                  key: API_KEY
            - name: API_PORT
              value: "8080"
            - name: RATE_LIMIT_RPS
              valueFrom:
                configMapKeyRef:
                  name: query-api-config
                  key: RATE_LIMIT_RPS
            - name: RATE_LIMIT_BURST
              valueFrom:
                configMapKeyRef:
                  name: query-api-config
                  key: RATE_LIMIT_BURST
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
