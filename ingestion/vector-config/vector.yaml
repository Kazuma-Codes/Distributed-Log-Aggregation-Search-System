# =============================================================================
# Vector Pipeline Configuration — Main Ingestion
# Distributed Log Aggregation & Search System
# =============================================================================
# Sources: file (JSON), kubernetes_logs, syslog (TCP)
# Transforms: parse → enrich → backpressure/route
# Sinks: Kafka (normal + priority), disk fallback, Prometheus metrics
# =============================================================================

data_dir: /var/lib/vector

# ---------------------------------------------------------------------------
# Sources
# ---------------------------------------------------------------------------
sources:
  app_logs:
    type: file
    include:
      - "/var/log/app/*.json"
    read_from: beginning
    codec:
      type: json

  k8s_logs:
    type: kubernetes_logs
    pod_annotation_fields:
      container_image: "container_image"
      container_name: "container_name"
    auto_partial_merge: true

  syslog:
    type: syslog
    address: "0.0.0.0:514"
    mode: tcp

# ---------------------------------------------------------------------------
# Transforms
# ---------------------------------------------------------------------------
transforms:
  parse_logs:
    type: remap
    inputs:
      - app_logs
      - k8s_logs
      - syslog
    source: |-
      # --- Timestamp -----------------------------------------------------------
      .timestamp = to_timestamp!(parse_timestamp(.timestamp ?? to_string(now()), "%+"))

      # --- Service name --------------------------------------------------------
      .service = .kubernetes.pod_labels."app.kubernetes.io/name" ??
                 .kubernetes.pod_labels.app ??
                 .service ??
                 "unknown"

      # --- Log level (normalise & default) -------------------------------------
      .level = downcase(.level ?? .severity ?? "info")

      # --- Message must be a string --------------------------------------------
      .message = to_string(.message ?? "")

      # --- HTTP status & duration (type-safe) ----------------------------------
      if exists(.http_status) {
        .http_status = to_int!(.http_status)
      }
      if exists(.duration_ms) {
        .duration_ms = to_float!(.duration_ms)
      }

      # --- Unique log ID -------------------------------------------------------
      .log_id = uuid_v4()

  enrich_logs:
    type: remap
    inputs:
      - parse_logs
    source: |-
      # --- Environment & datacenter tags ---------------------------------------
      .environment = .env ?? "production"
      del(.env)
      .datacenter = .dc ?? "dc1"
      del(.dc)

      # --- Processing metadata -------------------------------------------------
      ._processed_at = now()

  handle_backpressure:
    type: sample
    inputs:
      - enrich_logs
    rate: 10
    key_field: "service"

  route_by_level:
    type: route
    inputs:
      - enrich_logs
    route:
      high_priority: '.level == "error" || .level == "critical"'
      medium: '.level == "warn" || .level == "warning"'
      standard: '.level == "info" || .level == "debug" || .level == "trace"'

# ---------------------------------------------------------------------------
# Sinks
# ---------------------------------------------------------------------------
sinks:
  kafka:
    type: kafka
    inputs:
      - parse_logs
    bootstrap_servers: "log-kafka-kafka-bootstrap:9092"
    topic: "logs-{{ service }}"
    encoding:
      codec: json
    buffer:
      type: memory
      max_events: 100000
      when_full: drop_newest
    healthcheck:
      enabled: true
    compression: gzip

  kafka_high_priority:
    type: kafka
    inputs:
      - "route_by_level.high_priority"
    bootstrap_servers: "log-kafka-kafka-bootstrap:9092"
    topic: "logs-priority"
    encoding:
      codec: json
    buffer:
      type: memory
      max_events: 100000
      when_full: drop_newest
    healthcheck:
      enabled: true
    compression: gzip
    acknowledgements:
      enabled: true

  disk_fallback:
    type: file
    inputs:
      - parse_logs
    path: "/tmp/vector-fallback/%Y/%m/%d/%H.log"
    encoding:
      codec: json

  internal_metrics:
    type: prometheus_exporter
    inputs:
      - internal_metrics
    address: "0.0.0.0:9598"
